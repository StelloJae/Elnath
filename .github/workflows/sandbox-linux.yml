name: Linux Sandbox Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# B3b-3 ship gate. Runs the full Go test suite on Linux with bwrap
# installed so the //go:build linux runtime tests in
# internal/tools/bash_runner_bwrap_linux_test.go actually exercise
# user-namespace isolation, network deny, and host filesystem
# read-only binds. Per the v41 partner verdict the BwrapRunner is not
# considered shipped until this workflow is green.

jobs:
  bwrap-tests:
    name: Bubblewrap substrate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Install bubblewrap, netcat, curl
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap netcat-openbsd curl

      - name: Permit unprivileged user namespaces
        # Ubuntu 24.04 (and later 22.04 kernels) ships AppArmor
        # restrictions that block unprivileged user namespaces by
        # default. Without this disabled bwrap fails its loopback
        # setup with "Failed RTM_NEWADDR: Operation not permitted"
        # the moment --unshare-net is used. Production deployments
        # need either this sysctl flipped, an AppArmor profile that
        # allows /usr/bin/bwrap to use userns, or a kernel without
        # the restriction; the BwrapRunner probe reports the
        # underlying kernel error so operators can pick a fix.
        run: |
          if [ -f /proc/sys/kernel/apparmor_restrict_unprivileged_userns ]; then
            echo 0 | sudo tee /proc/sys/kernel/apparmor_restrict_unprivileged_userns
          fi
          if [ -f /proc/sys/kernel/unprivileged_userns_clone ]; then
            echo 1 | sudo tee /proc/sys/kernel/unprivileged_userns_clone
          fi

      - name: Verify bwrap user-namespace probe
        # Mirrors BwrapRunner.runProbe; failing here means the runner
        # would refuse to ship on this host and the integration tests
        # below would all skip — surface the failure early so it does
        # not silently hide a regression.
        run: bwrap --unshare-user --unshare-net --ro-bind / / /bin/true

      - name: Vet
        run: go vet ./...

      - name: Run all package tests with race detector
        run: go test -race -count=1 ./...

      - name: Run linux-tagged sandbox tests
        run: go test -race -count=1 -run 'Bwrap' ./internal/tools/...

      - name: Run B3b-4-S0 netns bridge spike (integration)
        # v41 / B3b-4-S0 spike. Proves the bwrap + self-exec + UDS
        # bridge design is buildable end-to-end. The test file is
        # tagged `linux && integration` so this is the only job that
        # exercises it; unit-test runs without `-tags=integration`
        # silently skip the file. The test builds the elnath binary
        # in a TempDir, exec's it as the bwrap-spawned wrapper
        # (bridge mode), and asserts a full HTTP round-trip plus a
        # negative direct-egress probe and an orphan-process check.
        # NOT a B3b-4 production proxy — it's the buildability
        # evidence that gates B3b-4-3 lane entry.
        run: go test -tags=integration -race -count=1 -run 'NetnsBridgeSpike' ./internal/tools/...

version: 2

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: elnath
    main: ./cmd/elnath
    binary: elnath
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^ci:"

brews:
  - repository:
      owner: StelloJae
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/StelloJae/elnath"
    description: "Autonomous AI assistant platform with native LLM Wiki"
    license: "Apache-2.0"
    install: |
      bin.install "elnath"
    test: |
      system "#{bin}/elnath", "version"

release:
  github:
    owner: StelloJae
    name: elnath
  draft: false
  prerelease: auto
